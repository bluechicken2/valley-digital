<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="XrayNews — Real-time global truth verification and news aggregation">
  <meta name="theme-color" content="#080b12">
  <title>XrayNews | Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css?v=10">
  <link rel="stylesheet" href="css/login.css?v=10">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body class="login-page">

  <!-- Starfield canvas -->
  <canvas class="starfield" id="starfield-canvas" aria-hidden="true"></canvas>

  <!-- Globe background -->
  <div class="login-globe-bg" id="login-globe" aria-hidden="true"></div>

  <!-- Dark overlay -->
  <div class="bg-overlay" aria-hidden="true"></div>

  <!-- Login container -->
  <main class="login-container" role="main">
    <div class="login-card">

      <!-- Logo -->
      <div class="login-logo" role="banner">
        <span class="logo-icon" aria-hidden="true">&#127760;</span>
        <span class="logo-text">XRAYNEWS</span>
      </div>

      <p class="login-tagline">Truth. Verified. Global.</p>

      <div class="beta-badge" role="status">&#9889; BETA &mdash; FREE ACCESS</div>

      <div class="login-divider" aria-hidden="true"></div>

      <!-- Auth message area -->
      <div class="auth-message" id="auth-message" role="alert" aria-live="polite" aria-atomic="true"></div>

      <h1 id="form-title" class="form-title">Welcome Back</h1>
      <p id="form-subtitle" class="form-subtitle">Sign in to access your XrayNews dashboard.</p>

      <!-- Login / Signup form -->
      <form class="login-form" id="login-form" novalidate aria-labelledby="form-title">

        <div class="form-group">
          <div class="form-input-wrap">
            <span class="input-icon" aria-hidden="true">&#9993;</span>
            <input
              type="email"
              id="email-input"
              class="input-field"
              placeholder="your@email.com"
              autocomplete="email"
              required
              aria-label="Email address"
            >
          </div>
        </div>

        <div class="form-group">
          <div class="form-input-wrap">
            <span class="input-icon" aria-hidden="true">&#128274;</span>
            <input
              type="password"
              id="password-input"
              class="input-field"
              placeholder="Password"
              autocomplete="current-password"
              required
              aria-label="Password"
            >
            <button
              type="button"
              class="password-toggle"
              id="pw-toggle"
              aria-label="Toggle password visibility"
            >&#128065;</button>
          </div>
        </div>

        <button type="submit" class="btn-signin" id="signin-btn">
          <span class="btn-text">SIGN IN</span>
          <span class="spinner" aria-hidden="true"></span>
        </button>

      </form>

      <!-- Switch auth mode -->
      <div class="auth-switch">
        <span id="switch-text">Don&#39;t have an account? </span>
        <button class="toggle-auth" id="switch-link" type="button">Create Account</button>
      </div>

      <!-- Or divider -->
      <div class="divider-or" role="separator"><span>or</span></div>

      <!-- Guest access -->
      <button class="btn-guest" id="guest-btn" type="button">
        &#127760; CONTINUE AS GUEST &rarr;
      </button>

      <p class="login-footer">Your data is never sold. Truth has no price.</p>

    </div>
  </main>

  <!-- JS -->
  <script src="js/supabase-config.js?v=10"></script>
  <script src="js/auth.js?v=10"></script>
  <script>
    // Lazy-load globe.gl for background — non-blocking
    (function() {
      var s = document.createElement('script');
      s.src = 'https://unpkg.com/globe.gl';
      s.async = true;
      s.onload = function() {
        if (typeof initLoginGlobe === 'function') initLoginGlobe();
      };
      document.body.appendChild(s);
    })();
  </script>

</body>
</html>
