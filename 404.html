<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XrayNews | 404</title>
  <meta name="theme-color" content="#080b12">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/globe.gl"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#080b12;
      --cyan:#00d4ff;
      --purple:#7b2fff;
    }
    html,body{
      width:100%;height:100%;background:var(--bg);
      font-family:Inter,sans-serif;color:#e8eaf0;
      overflow:hidden;
    }
    /* ---- Starfield ---- */
    #stars-canvas{
      position:fixed;inset:0;z-index:0;pointer-events:none;
    }
    /* ---- Globe bg ---- */
    #globe-404{
      position:fixed;inset:0;z-index:1;
      opacity:0.22;
      pointer-events:none;
    }
    /* ---- Content ---- */
    .err-wrap{
      position:relative;z-index:10;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      min-height:100vh;
      gap:20px;
      padding:32px 20px;
      text-align:center;
    }
    .err-logo{
      font-family:Orbitron,sans-serif;
      font-size:13px;font-weight:700;letter-spacing:.18em;
      color:rgba(0,212,255,.5);
      text-decoration:none;
      margin-bottom:8px;
      display:flex;align-items:center;gap:8px;
    }
    .err-404{
      font-family:Orbitron,sans-serif;
      font-size:clamp(96px,18vw,180px);
      font-weight:900;
      line-height:1;
      letter-spacing:.04em;
      background:linear-gradient(135deg, var(--cyan) 0%, var(--purple) 100%);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      animation:pulse404 2.8s ease-in-out infinite;
      filter:drop-shadow(0 0 40px rgba(0,212,255,.35));
    }
    @keyframes pulse404{
      0%,100%{filter:drop-shadow(0 0 30px rgba(0,212,255,.3));}
      50%{filter:drop-shadow(0 0 60px rgba(0,212,255,.6)) drop-shadow(0 0 100px rgba(123,47,255,.3));}
    }
    .err-title{
      font-family:Orbitron,sans-serif;
      font-size:clamp(22px,4vw,36px);
      font-weight:700;
      letter-spacing:.12em;
      color:#fff;
      margin-top:-8px;
    }
    .err-sub{
      font-size:clamp(13px,2vw,16px);
      color:rgba(255,255,255,.42);
      max-width:460px;
      line-height:1.7;
    }
    .err-divider{
      width:80px;height:1px;
      background:linear-gradient(90deg,transparent,var(--cyan),transparent);
      margin:4px 0;
    }
    .err-btn{
      display:inline-flex;align-items:center;gap:10px;
      padding:15px 34px;
      background:linear-gradient(135deg,rgba(0,212,255,.12),rgba(123,47,255,.12));
      border:1px solid rgba(0,212,255,.35);
      border-radius:10px;
      color:var(--cyan);
      font-family:Orbitron,sans-serif;
      font-size:11px;font-weight:700;letter-spacing:.1em;
      text-decoration:none;
      transition:all .25s ease;
      margin-top:8px;
    }
    .err-btn:hover{
      background:linear-gradient(135deg,rgba(0,212,255,.22),rgba(123,47,255,.22));
      border-color:var(--cyan);
      transform:translateY(-2px);
      box-shadow:0 12px 40px rgba(0,212,255,.2);
    }
    .err-signal{
      display:flex;align-items:center;gap:6px;
      font-size:11px;color:rgba(255,255,255,.22);
      font-family:monospace;letter-spacing:.05em;
    }
    .err-signal-dot{
      width:6px;height:6px;border-radius:50%;
      background:#ff4444;
      box-shadow:0 0 8px #ff4444;
      animation:blink .9s ease-in-out infinite;
    }
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
  </style>
</head>
<body>

<canvas id="stars-canvas"></canvas>
<div id="globe-404"></div>

<div class="err-wrap">
  <a href="/" class="err-logo">&#127760; XRAYNEWS</a>
  <div class="err-404">404</div>
  <div class="err-title">SIGNAL LOST</div>
  <div class="err-divider"></div>
  <p class="err-sub">The story you&rsquo;re looking for doesn&rsquo;t exist or has been removed from the feed.</p>
  <a href="/" class="err-btn">&#127757; RETURN TO XRAYNEWS</a>
  <div class="err-signal">
    <span class="err-signal-dot"></span>
    NO SIGNAL &nbsp;&middot;&nbsp; ERROR 404 &nbsp;&middot;&nbsp; STREAM OFFLINE
  </div>
</div>

<script>
// ---- Starfield ----
(function(){
  var c  = document.getElementById('stars-canvas');
  var cx = c.getContext('2d');
  var W, H, stars;
  function resize() {
    W = c.width  = window.innerWidth;
    H = c.height = window.innerHeight;
    stars = Array.from({length:180}, function(){
      return {
        x: Math.random()*W, y: Math.random()*H,
        r: Math.random()*1.4+0.2,
        o: Math.random()*0.6+0.1,
        s: Math.random()*0.4+0.1
      };
    });
  }
  function draw(ts) {
    cx.clearRect(0,0,W,H);
    stars.forEach(function(s){
      s.o += Math.sin(ts/800 + s.x) * 0.008;
      if(s.o<0.05)s.o=0.05;
      if(s.o>0.75)s.o=0.75;
      cx.beginPath();
      cx.arc(s.x,s.y,s.r,0,Math.PI*2);
      cx.fillStyle='rgba(255,255,255,'+s.o+')';
      cx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);
  resize();
  requestAnimationFrame(draw);
})();

// ---- Mini Globe ----
(function(){
  if(typeof Globe==='undefined') return;
  var el = document.getElementById('globe-404');
  var g = Globe()
    .width(window.innerWidth)
    .height(window.innerHeight)
    .backgroundColor('rgba(0,0,0,0)')
    .atmosphereColor('rgba(0,212,255,0.5)')
    .atmosphereAltitude(0.22)
    .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg');
  g(el);
  var ctrl = g.controls();
  ctrl.autoRotate = true;
  ctrl.autoRotateSpeed = 0.6;
  ctrl.enableZoom = false;
  ctrl.enablePan  = false;
  window.addEventListener('resize', function(){
    g.width(window.innerWidth).height(window.innerHeight);
  });
})();
</script>
</body>
</html>
